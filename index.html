<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino MA">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>Maria Aline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TEMAS ── */
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#22222f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f5;--muted:#6b6b80;--muted2:#9090a8;
  --accent:#7c6af7;--accent2:#a599ff;
  --green:#3ecf8e;--green2:rgba(62,207,142,.15);
  --amber:#f59e0b;--amber2:rgba(245,158,11,0.15);
  --red:#ef4444;--red2:rgba(239,68,68,0.15);
  --blue:#38bdf8;--blue2:rgba(56,189,248,0.12);
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:14px;--r2:20px;
  --shadow:none;
}
body.light{
  --bg:#f4f4f8;--surface:#ffffff;--surface2:#eeeef4;--surface3:#e4e4ec;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1a2e;--muted:#7878a0;--muted2:#9090b8;
  --accent:#6c5ce7;--accent2:#7c6af7;
  --green:#1a9e68;--green2:rgba(26,158,104,.12);
  --amber:#d97706;--amber2:rgba(217,119,6,0.12);
  --red:#dc2626;--red2:rgba(220,38,38,0.10);
  --blue:#0284c7;--blue2:rgba(2,132,199,0.10);
  --shadow:0 1px 4px rgba(0,0,0,0.07);
}

/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);transition:background .25s,color .25s}
body{display:flex;flex-direction:column}
.app{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 0 72px}
.page{display:none;padding:16px 16px 8px}.page.active{display:block}

/* ── TOGGLE TEMA ── */
.theme-toggle{margin-top:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:50px;padding:6px 16px;font-size:12px;font-family:var(--mono);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .2s;color:var(--muted);min-height:34px}
.theme-toggle:active{transform:scale(.93);background:var(--surface3)}

/* ── NAV TABS ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(2,1fr);z-index:20;padding-bottom:env(safe-area-inset-bottom);box-shadow:var(--shadow)}
.nav-btn{padding:10px 4px 8px;font-size:9px;font-family:var(--mono);letter-spacing:.5px;color:var(--muted);background:none;border:none;cursor:pointer;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--accent2)}

/* ── COMMON ── */
.section-title{font-size:10px;font-family:var(--mono);letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.btn{width:100%;padding:14px;border-radius:var(--r);font-size:14px;font-family:var(--sans);font-weight:500;cursor:pointer;border:none;transition:all .15s;margin-bottom:8px;display:block;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#5b4fcf);color:#fff}
.btn-green{background:linear-gradient(135deg,var(--green),#1a9e68);color:#fff}
.btn-ghost{background:var(--surface);border:1px solid var(--border2);color:var(--muted)}
.btn-amber{background:transparent;border:1px solid rgba(245,158,11,.35);color:var(--amber);font-size:13px;padding:11px}
.btn-red{background:transparent;border:1px solid rgba(239,68,68,.35);color:var(--red);font-size:13px;padding:11px}
.pill{background:var(--surface2);border-radius:8px;padding:3px 8px;font-size:11px;font-family:var(--mono);color:var(--text)}
.pill.g{background:var(--green2);color:var(--green)}
.pill.a{background:var(--amber2);color:var(--amber)}
.tag{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:6px}
.tag-green{background:var(--green2);color:var(--green)}
.tag-amber{background:var(--amber2);color:var(--amber)}
.tag-red{background:var(--red2);color:var(--red)}
.tag-blue{background:var(--blue2);color:var(--blue)}
.tag-muted{background:var(--surface2);color:var(--muted)}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.blinking{animation:blink 1s infinite}

/* ── HOME ── */
.home-header{text-align:center;padding:20px 0 16px;display:flex;flex-direction:column;align-items:center;gap:6px}
.logo-mark{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.home-header h1{font-size:26px;font-weight:600;background:linear-gradient(135deg,var(--accent2) 0%,var(--green) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.alert-banner{border-radius:var(--r);padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.5}
.alert-red{background:var(--red2);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.alert-amber{background:var(--amber2);border:1px solid rgba(245,158,11,.3);color:var(--amber)}
.alert-yellow{background:rgba(250,204,21,.12);border:1px solid rgba(250,204,21,.45);color:#a16207}
body.light .alert-yellow{color:#92400e}
.alert-subtle{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}

.suggest-card{background:linear-gradient(135deg,rgba(124,106,247,.15),rgba(124,106,247,.05));border:1px solid rgba(124,106,247,.3);border-radius:var(--r2);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
body.light .suggest-card{background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(108,92,231,.02));border-color:rgba(108,92,231,.25)}
.suggest-label{font-size:10px;font-family:var(--mono);letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:4px}
.suggest-name{font-size:16px;font-weight:500;margin-bottom:12px}

.pending-card{background:linear-gradient(135deg,var(--green2),rgba(62,207,142,.03));border:1px solid rgba(62,207,142,.25);border-radius:var(--r2);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.pending-label{font-size:10px;font-family:var(--mono);letter-spacing:2px;color:var(--green);text-transform:uppercase;margin-bottom:4px}
.pending-name{font-size:15px;font-weight:500;margin-bottom:12px}

/* ── SESSÕES ── */
.sess-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.sess-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow)}
.sess-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sess-letra{font-size:14px;font-weight:600;font-family:var(--mono);background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sess-fraction{font-size:13px;font-family:var(--mono);color:var(--muted)}
.sess-fraction strong{font-size:20px;font-weight:700;color:var(--text)}
.sess-bar{height:3px;background:var(--surface2);border-radius:100px;overflow:hidden}
.sess-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:100px;transition:width .4s}

/* ── TREINO GRID ── */
.treino-grid-new{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.treino-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px 12px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.treino-card:active{transform:scale(.96)}
.treino-card .tc-letra{font-size:28px;font-weight:600;font-family:var(--mono);background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.treino-card .tc-info{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.treino-card .tc-sess{font-size:11px;font-family:var(--mono);color:var(--accent2);margin-top:6px}

/* ── EXERCICIO ── */
.prog-bar-wrap{margin-bottom:12px}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;color:var(--muted);font-family:var(--mono)}
.prog-bar{height:3px;background:var(--surface2);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:100px;transition:width .4s}

.ex-list-btn{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px 14px;cursor:pointer;margin-bottom:10px;width:100%;font-family:var(--sans);color:var(--text);box-shadow:var(--shadow)}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.ex-tag{font-size:10px;font-family:var(--mono);letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:5px}
.ex-name{font-size:18px;font-weight:500;line-height:1.35}
.ex-name a{color:var(--accent2);text-decoration:none;border-bottom:1px solid rgba(165,153,255,.3)}
.ex-conjugado{font-size:12px;color:var(--amber);margin-top:4px;font-family:var(--mono)}
.ex-meta{font-size:13px;color:var(--muted);margin-top:5px}
.series-badges{display:flex;gap:5px;margin-top:10px}
.s-badge{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);color:var(--muted)}
.s-badge.done{background:var(--green2);border-color:var(--green);color:var(--green)}
.s-badge.current{background:rgba(124,106,247,.2);border-color:var(--accent);color:var(--accent2)}

.link-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.link-btn{display:inline-flex;align-items:center;gap:5px;background:var(--blue2);border:1px solid rgba(56,189,248,.2);border-radius:8px;padding:5px 10px;font-size:11px;font-family:var(--mono);color:var(--blue);text-decoration:none;cursor:pointer}

.series-done{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.serie-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.serie-row:last-child{border-bottom:none}
.s-label{font-size:11px;font-family:var(--mono);color:var(--muted)}
.s-data{display:flex;gap:5px}

.timer-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px;text-align:center;box-shadow:var(--shadow)}
.timer-label{font-size:10px;font-family:var(--mono);letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.timer-num{font-size:48px;font-family:var(--mono);font-weight:500;letter-spacing:-2px;color:var(--green)}
.timer-num.idle{color:var(--muted)}
.timer-pulse{font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:4px;min-height:14px}

.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.field label{font-size:10px;font-family:var(--mono);letter-spacing:1px;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px;font-size:17px;font-family:var(--mono);color:var(--text);outline:none;-webkit-appearance:none}
.field input:focus{border-color:var(--accent)}

/* ── REST OVERLAY ── */
.rest-overlay{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.rest-overlay.hidden{display:none}
.rest-type{font-size:10px;font-family:var(--mono);letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.rest-big{font-size:88px;font-family:var(--mono);font-weight:500;letter-spacing:-4px;line-height:1;margin-bottom:6px}
.rest-big.gc{color:var(--green)}.rest-big.ac{color:var(--amber)}
.rest-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.rest-next{font-size:14px;font-weight:500;color:var(--text);margin-bottom:32px;max-width:280px;line-height:1.6;padding:12px 18px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border)}
.rest-skip{background:transparent;border:1px solid var(--border2);border-radius:var(--r);padding:13px 32px;font-size:13px;font-family:var(--sans);font-weight:500;color:var(--muted);cursor:pointer}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;display:flex;flex-direction:column;justify-content:flex-end}
.modal-overlay.hidden{display:none}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;max-height:85vh;display:flex;flex-direction:column}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-header h3{font-size:15px;font-weight:500}
.modal-close{background:var(--surface2);border:none;border-radius:50%;width:30px;height:30px;font-size:18px;color:var(--muted);cursor:pointer;line-height:1}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.modal-item{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer}
.modal-item:active{background:var(--surface2)}
.modal-item:last-child{border-bottom:none}
.modal-item.done-ex .mi-name{color:var(--muted)}
.modal-item.current-ex{background:rgba(124,106,247,.08)}
.mi-num{font-size:10px;font-family:var(--mono);color:var(--muted);min-width:20px}
.mi-name{font-size:13px;flex:1;line-height:1.4}

/* ── ESTEIRA ── */
.esteira-wrap{text-align:center;padding:28px 0}
.esteira-icon{font-size:44px;margin-bottom:14px}
.esteira-timer{font-size:68px;font-family:var(--mono);font-weight:500;color:var(--green);letter-spacing:-3px;margin:20px 0}

/* ── FINISHED ── */
.finish-hero{text-align:center;padding:28px 0 20px}
.finish-check{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--green),#1a9e68);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:30px}
.finish-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--shadow)}
.stat-num{font-size:22px;font-family:var(--mono);font-weight:500;color:var(--accent2)}
.stat-label{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--mono)}

/* ── HISTÓRICO ── */
.hist-tabs{display:flex;gap:8px;margin-bottom:14px}
.hist-tab{flex:1;padding:8px;border-radius:var(--r);font-size:12px;font-family:var(--mono);border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;text-align:center;transition:all .2s}
.hist-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
</style>
</head>
<body>
<!-- SPLASH SCREEN -->
<div id="splash" style="position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .4s">
  <div style="font-size:42px">💪</div>
  <div style="font-size:18px;font-weight:600;font-family:var(--sans);background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Treino Academia</div>
  <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script>setTimeout(function(){var s=document.getElementById('splash');if(s){s.style.opacity='0';setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s)},400)}},600);</script>

<!-- INDICADOR OFFLINE -->
<div id="offline-bar" style="display:none;position:fixed;top:0;left:0;right:0;background:var(--amber);color:#1a1a1a;text-align:center;font-size:12px;font-family:var(--mono);padding:6px;z-index:60;font-weight:500">
  📡 Sem conexão — dados salvos localmente, sincroniza ao reconectar
</div>

<div class="app" id="app">

<!-- ══ HOME ══ -->
<div class="page active" id="page-home">
  <div class="home-header">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <button onclick="abrirConfigToken()" style="background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:5px">
        <span id="gh-status">☁️</span><span id="gh-status-label">Backup</span>
      </button>
      <button id="theme-btn" onclick="toggleTema()" style="background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:5px">
        <span id="theme-icon">☀️</span><span id="theme-label">Claro</span>
      </button>
    </div>
    <div class="logo-mark">Treino Academia</div>
    <h1>Maria Aline</h1>
  </div>
  <div id="home-alerts"></div>
  <div id="home-pending"></div>
  <div id="home-suggest"></div>
  <div class="section-title">Sessões concluídas</div>
  <div class="sess-grid" id="sess-grid"></div>
  <div class="section-title">Treino de hoje</div>
  <div class="treino-grid-new" id="treino-grid"></div>
</div>

<!-- ══ EXERCICIO ══ -->
<div class="page" id="page-ex">
  <div>
    <div class="prog-bar-wrap">
      <div class="prog-meta"><span id="prog-label">Treino A</span><span id="prog-count">1/10</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <button class="ex-list-btn" onclick="abrirLista()">
      <span style="font-size:13px">Ver / escolher exercício</span><span style="color:var(--accent2);font-family:var(--mono)">≡</span>
    </button>
    <div id="ex-card" class="ex-card"></div>
    <div id="series-done-wrap"></div>
    <div id="action-area"></div>
    <button class="btn btn-amber" onclick="pularExercicio()">Pular este exercício</button>
  </div>
</div>

<!-- ══ ESTEIRA ══ -->
<div class="page" id="page-esteira">
  <div>
    <div class="esteira-wrap">
      <div class="esteira-icon">🏃</div>
      <div style="font-size:18px;font-weight:500;margin-bottom:4px" id="esteira-title">Esteira</div>
      <div style="font-size:13px;color:var(--muted)" id="esteira-sub">Prepare-se</div>
      <div class="esteira-timer" id="esteira-timer">10:00</div>
    </div>
    <button class="btn btn-primary" id="btn-iniciar-esteira" onclick="iniciarEsteira()">▶ Iniciar esteira</button>
    <button class="btn btn-green" id="btn-parar-esteira" style="display:none" onclick="confirmarPararEsteira()">⏹ Parar e salvar tempo</button>
    <button class="btn" id="btn-pular-esteira" style="background:transparent;border:1px solid var(--border2);color:var(--muted);margin-top:8px" onclick="confirmarPularEsteira()">⏭ Pular sem fazer</button>
  </div>
</div>

<!-- ══ CONCLUÍDO ══ -->
<div class="page" id="page-finished">
  <div>
    <div class="finish-hero">
      <div class="finish-check">✓</div>
      <div style="font-size:24px;font-weight:600;margin-bottom:4px">Treino concluído!</div>
      <div style="font-size:13px;color:var(--muted)" id="fin-sub"></div>
    </div>
    <div class="finish-stats" id="fin-stats"></div>
    <div class="section-title">Resumo</div>
    <div id="fin-detail"></div>

/* ════ GITHUB SYNC ════ */
const GH_REPO = 'RafaelRodriPinto/Treino_Aline';
const GH_FILE = 'dados.json';
const GH_API  = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;

function getToken(){ return localStorage.getItem('gym_ma_gh_token')||''; }
function setToken(t){try{localStorage.setItem('gym_ma_gh_token',t)}catch(e){}}

let _ghSha = null;
let _syncTimer = null;
let _syncTimeout = null;

async function ghGet(){
  const token=getToken(); if(!token)return null;
  try{
    const r=await fetch(GH_API,{headers:{
      'Authorization':'token '+token,
      'Accept':'application/vnd.github.v3+json'
    }});
    if(r.status===404)return {content:[],sha:null};
    if(!r.ok)return null;
    const d=await r.json();
    const content=JSON.parse(atob(d.content.replace(/\n/g,'')));
    return {content, sha:d.sha};
  }catch(e){return null}
}

async function ghPut(data, sha){
  const token=getToken(); if(!token)return false;
  try{
    const body={
      message:'Histórico atualizado',
      content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),
    };
    if(sha)body.sha=sha;
    const r=await fetch(GH_API,{method:'PUT',headers:{
      'Authorization':'token '+token,
      'Accept':'application/vnd.github.v3+json',
      'Content-Type':'application/json'
    },body:JSON.stringify(body)});
    return r.ok;
  }catch(e){return false}
}

function formatarUltimaSinc(ts){
  const diffMin=Math.floor((Date.now()-ts)/60000);
  if(diffMin<1)return'Sincronizado agora';
  if(diffMin<60)return'Sincronizado há '+diffMin+'min';
  const diffH=Math.floor(diffMin/60);
  if(diffH<24)return'Sincronizado há '+diffH+'h';
  return'Sincronizado há '+Math.floor(diffH/24)+'d';
}
function atualizarStatusBackup(){
  const token=getToken();
  const el=document.getElementById('gh-status');
  const lbl=document.getElementById('gh-status-label');
  if(el)el.textContent=token?'✅':'☁️';
  if(lbl){
    if(!token){lbl.textContent='Backup';return}
    const ultimo=getUltimaSinc();
    lbl.textContent=ultimo?formatarUltimaSinc(ultimo):'Backup';
  }
}
function getUltimaSinc(){try{return parseInt(localStorage.getItem('gym_ultima_sinc')||'0')||null}catch(e){return null}}
function setUltimaSinc(ts){try{localStorage.setItem('gym_ultima_sinc',String(ts))}catch(e){}}

function montarPayloadCompleto(treinos){
  return { treinos, sess: loadSessoes(), updated: Date.now() };
}
function normalizarRemoto(remotoContent){
  if(Array.isArray(remotoContent)) return {treinos:remotoContent, sess:{A:0,B:0}};
  return {
    treinos: remotoContent.treinos||remotoContent.hist||[],
    sess: remotoContent.sess||{A:0,B:0},
  };
}
function sincronizarGitHub(){
  // debounce — espera 3s antes de sincronizar (evita múltiplas chamadas seguidas)
  clearTimeout(_syncTimeout);
  _syncTimeout=setTimeout(async()=>{
    const token=getToken(); if(!token)return;
    const localTreinos=loadHist();
    const remoto=await ghGet();
    if(!remoto)return;
    const r=normalizarRemoto(remoto.content);

    // merge treinos: une local + remoto, remove duplicatas por inicio+tipo
    const todos=[...localTreinos,...r.treinos];
    const vistos=new Set();
    const mergedTreinos=todos.filter(h=>{
      const k=(h.inicio||0)+'_'+h.tipo;
      if(vistos.has(k))return false;
      vistos.add(k);return true;
    });
    mergedTreinos.sort((a,b)=>(b.inicio||0)-(a.inicio||0));
    if(mergedTreinos.length>120)mergedTreinos.splice(120);
    try{localStorage.setItem('gym_hist_v6',JSON.stringify(mergedTreinos))}catch(e){}

    // merge peso: une por data (local tem prioridade se houver conflito no mesmo dia)
    const localPeso=loadPesoLog();
    const pesoPorData={};
    r.peso.forEach(p=>pesoPorData[p.data]=p);
    localPeso.forEach(p=>pesoPorData[p.data]=p); // local sobrescreve
    const mergedPeso=Object.values(pesoPorData).sort((a,b)=>a.ts-b.ts);
    savePesoLog(mergedPeso);

    // hidratação e suplementos: só do dia atual — local sempre ganha se for hoje, senão usa remoto se mais recente
    const localHidrat=loadHidratHoje();
    const mergedHidrat=(r.hidratacao&&r.hidratacao.data===today()&&!localHidrat.feitos.length)?r.hidratacao:localHidrat;
    saveHidratHoje(mergedHidrat);

    const localSuple=loadSupleHoje();
    const mergedSuple=(r.suplementos&&r.suplementos.data===today()&&!localSuple.feitos.length)?r.suplementos:localSuple;
    saveSupleHoje(mergedSuple);

    // avaliações: une por data, local tem prioridade
    const localAvals=loadAvaliacoes();
    const avalsPorData={};
    (r.avaliacoes||[]).forEach(a=>avalsPorData[a.data]=a);
    localAvals.forEach(a=>avalsPorData[a.data]=a);
    const mergedAvals=Object.values(avalsPorData).sort((a,b)=>new Date(a.data)-new Date(b.data));
    try{localStorage.setItem('gym_avaliacoes',JSON.stringify(mergedAvals))}catch(e){}

    // dias completos (streaks): une os arrays de cada tipo (hidrat/suple)
    const localDC=loadDiasCompletos();
    const remotoDC=r.diasCompletos||{};
    const mergedDC={};
    ['hidrat','suple'].forEach(tipo=>{
      const setDias=new Set([...(localDC[tipo]||[]),...(remotoDC[tipo]||[])]);
      mergedDC[tipo]=Array.from(setDias).sort();
    });
    saveDiasCompletos(mergedDC);

    // estoque: local tem prioridade (datas de início não mudam, mas se editar localmente prevalece)
    const localEstoque=loadEstoque();
    const mergedEstoque=(r.estoque&&r.estoque.length&&!localStorage.getItem('gym_estoque'))?r.estoque:localEstoque;
    saveEstoque(mergedEstoque);

    // salva tudo no GitHub
    const payload=montarPayloadCompleto(mergedTreinos);
    const ok=await ghPut(payload, remoto.sha);
    if(ok){
      setUltimaSinc(Date.now());
      atualizarStatusBackup();
    }
  },3000);
}

function migrarHistoricoAntigo(){
  if(localStorage.getItem('gym_migrated_v6'))return;
  const keys=['gym_hist_v5','gym_hist_v4','gym_hist_v3'];
  let importados=0;
  keys.forEach(k=>{
    try{
      const old=JSON.parse(localStorage.getItem(k)||'[]');
      old.forEach(h=>{
        // marca como plano antigo se não tiver plano definido
        if(!h.plano) h.plano='antigo';

        if(!h.dataStr) h.dataStr=h.data?new Date(h.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'?';
        saveHist(h);
        importados++;
      });
    }catch(e){}
  });
  localStorage.setItem('gym_migrated_v6','1');
  if(importados>0) console.log('Migrados '+importados+' treinos do histórico anterior.');
}

/* ════ UTILS ════ */
function pad(n){return String(Math.max(0,n)).padStart(2,'0')}
function fmtHMS(ms){const t=Math.floor(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return pad(h)+':'+pad(m)+':'+pad(s)}
function fmtMS(s){s=Math.max(0,s);return pad(Math.floor(s/60))+':'+pad(s%60)}
function elapsed(ts){return Math.floor((Date.now()-ts)/1000)}
function restRem(ts,total){return Math.max(0,total-elapsed(ts))}

function diasAtePrazo(){
  const now=new Date(); now.setHours(0,0,0,0);
  const p=new Date(PRAZO); p.setHours(0,0,0,0);
  return Math.ceil((p-now)/(1000*60*60*24));
}

// sugestão: próximo treino na rotação A→B→C→D→A...
function sugerirTreino(){
  const sess=loadSessoes();
  const hist=loadHist();
  const ultimo=hist.find(h=>h.plano==='novo');
  if(ultimo){
    const idx=ORDEM.indexOf(ultimo.tipo);
    return ORDEM[(idx+1)%ORDEM.length];
  }
  // sem histórico: sugere o com menos sessões
  let menorTreino=ORDEM[0], menorN=sess[ORDEM[0]]||0;
  ORDEM.forEach(t=>{const n=sess[t]||0;if(n<menorN){menorN=n;menorTreino=t;}});
  return menorTreino;
}

  const now=new Date(); now.setHours(0,0,0,0);
  const inicioPlazo=new Date(INICIO_PLANO); inicioPlazo.setHours(0,0,0,0);
  const planoAtivo=now>=inicioPlazo;
  let alertHtml='';
  if(planoAtivo){
    if(dias<=0){
      alertHtml=`<div class="alert-banner alert-red">⚠️ O prazo do plano encerrou em ${PRAZO.toLocaleDateString('pt-BR')}.</div>`;
    }else if(dias<=14){
      alertHtml=`<div class="alert-banner alert-red">🔴 Faltam <b>${dias} dia${dias>1?'s':''}</b> para o fim do plano (${PRAZO.toLocaleDateString('pt-BR')})!</div>`;
    }else if(dias<=30){
      alertHtml=`<div class="alert-banner alert-amber">⏰ Faltam <b>${dias} dias</b> para o fim do plano (${PRAZO.toLocaleDateString('pt-BR')}).</div>`;
    }else{
      alertHtml=`<div class="alert-banner alert-amber" style="opacity:.75">📅 Plano ativo até ${PRAZO.toLocaleDateString('pt-BR')} · Faltam ${dias} dias.</div>`;
    }
  }
  document.getElementById('home-alerts').innerHTML=alertHtml;
  // resumo semanal não disponível

  // Treino pendente (não concluído hoje)
  const pend=load();
  if(pend&&!pend.finalizado){
    const ex=TREINOS[pend.tipo].exercicios[pend.exIdx];
    document.getElementById('home-pending').innerHTML=`<div class="pending-card">
      <div class="pending-label">● Em andamento</div>
      <div class="pending-name">Treino ${pend.tipo} · ${exNome(ex)}<br><span style="font-size:12px;color:var(--muted)">Série ${(pend.serieIdxs?pend.serieIdxs[pend.exIdx]:pend.serieIdx||0)+1}/3</span></div>
      <button class="btn btn-primary" onclick="retomar()" style="margin-bottom:6px">↩ Retomar de onde parei</button>
      <button class="btn btn-red" onclick="descartar()">Descartar</button>
    </div>`;
  }else{
    document.getElementById('home-pending').innerHTML='';
    // Sugestão apenas se não há pendente
    const sug=sugerirTreino();
    const t=TREINOS[sug];
    document.getElementById('home-suggest').innerHTML=`<div class="suggest-card">
      <div class="suggest-label">Sugestão de hoje</div>
      <div class="suggest-name">Treino ${sug} — ${t.info}</div>
      <button class="btn btn-primary" style="margin:0" onclick="iniciarTreino('${sug}')">Fazer Treino ${sug} agora</button>
    </div>`;
  }

  // Sessões
  const sess=loadSessoes();
  let sgHtml='';
  ORDEM.forEach(t=>{
    const n=sess[t]||0;
    const pct=Math.min(100,Math.round((n/META_SESSOES)*100));
    sgHtml+=`<div class="sess-card">
      <div class="sess-letra">${t}</div>
      <div style="font-size:16px;font-weight:600;font-family:var(--mono);color:var(--text)">${n}<span style="font-size:12px;color:var(--muted);font-weight:400">/${META_SESSOES}</span></div>
      <div class="sess-bar"><div class="sess-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  document.getElementById('sess-grid').innerHTML=sgHtml;

  // Grid de treinos
  let tgHtml='';
  ORDEM.forEach(t=>{
    const tr=TREINOS[t];
    const n=sess[t]||0;
    tgHtml+=`<div class="treino-card" onclick="iniciarTreino('${t}')">
      <div class="tc-letra">${t}</div>
      <div class="tc-info">${tr.info}</div>
      <div class="tc-sess">${n}/${META_SESSOES} sessões</div>
    </div>`;
  });
  document.getElementById('treino-grid').innerHTML=tgHtml;
}

function descartar(){
  try{localStorage.removeItem('gym_v6')}catch(e){}
  renderHome();
}
function iniciarTreino(tipo){
  const p=load();
  if(p&&!p.finalizado&&p.tipo===tipo){retomar();return}
  if(p&&!p.finalizado){descartar()}
  const tr=TREINOS[tipo];
  E={
    tipo, plano:'novo', data:today(), exIdx:0,
    // serieIdx agora é um array por exercício em vez de global
    serieIdxs:tr.exercicios.map(()=>0),
    series:tr.exercicios.map(ex=>(ex.tipo==='normal'||ex.tipo==='conjugado')?Array(ex.series||3).fill(null):[]),
    pulados:[], finalizado:false, inicio:Date.now(),
    serieStartTs:null, restStartTs:null, restTotal:0, restTipo:null,
    esteiraStartTs:null, esteiraTipo:null,
  };
  save(); goExercicio();
}
function retomar(){
  E=load(); if(!E){voltarHome();return}
  // migração: se estado antigo tem serieIdx global, converte para array
  if(typeof E.serieIdxs[E.exIdx] === 'number' && !E.serieIdxs){
    const tr=TREINOS[E.tipo];
    E.serieIdxs=tr.exercicios.map((_,i)=>i===E.exIdx?E.serieIdxs[E.exIdx]:0);
    delete E.serieIdxs[E.exIdx];
    save();
  }
  // garante que serieIdxs tem o tamanho certo
  if(!E.serieIdxs){
    E.serieIdxs=TREINOS[E.tipo].exercicios.map(()=>0);
    save();
  }
  if(E.restStartTs&&E.restTotal){
    const rem=restRem(E.restStartTs,E.restTotal);
    if(rem>0){_restCb=E.restTipo==='serie'?()=>goExercicio():()=>avancarExercicio();mostrarDescansoRetomado();return}
    E.restStartTs=null;E.restTotal=0;
    if(E.restTipo==='serie')goExercicio(); else avancarExercicio(); return;
  }
  if(E.esteiraTipo&&E.esteiraStartTs){
    const rem=restRem(E.esteiraStartTs,esteiraDuracao(E.esteiraTipo));
    if(rem>0){mostrarEsteiraRetomada();return}
    E.esteiraStartTs=null;terminarEsteira();return;
  }
  if(E.esteiraTipo&&!E.esteiraStartTs){
    // esteira aberta mas ainda não iniciada (não apertou "Iniciar")
    goEsteira(E.esteiraTipo);return;
  }
  goExercicio();
}

/* ════ EXERCICIO ════ */
function exNome(ex){
  if(!ex)return'';
  if(ex.tipo==='esteira_inicio')return'Esteira (aquecimento)';
  if(ex.tipo==='esteira_fim')return'Esteira (finalização)';
  if(ex.tipo==='conjugado')return ex.nome+' + '+ex.nome2;
  return ex.nome||'';
}
function exFoiConcluido(idx){
  const ex=TREINOS[E.tipo].exercicios[idx];
  if(!ex||ex.tipo==='esteira_inicio'||ex.tipo==='esteira_fim')return false;
  return E.series[idx]&&E.series[idx].every(s=>s!==null);
}
function exFoiPulado(idx){return E.pulados&&E.pulados.includes(idx)}

function goExercicio(){
  clearAllTicks();
  E.restStartTs=null;E.restTotal=0;E.restTipo=null; save();
  const ex=TREINOS[E.tipo].exercicios[E.exIdx];
  if(!ex){finalizarTreino();return}
  if(ex.tipo==='esteira_inicio'||ex.tipo==='esteira_fim'){goEsteira(ex.tipo);return}
  showPage('ex');
  renderExCard();renderSeriesDone();renderActionArea();
  if(E.serieStartTs)retomaSerieCronometro();
}

function renderExCard(){
  const exs=TREINOS[E.tipo].exercicios;
  const ex=exs[E.exIdx];
  const normTotal=exs.filter(e=>e.tipo==='normal'||e.tipo==='conjugado').length;
  const normDone=exs.slice(0,E.exIdx).filter(e=>e.tipo==='normal'||e.tipo==='conjugado').length;
  document.getElementById('prog-label').textContent='Treino '+E.tipo;
  document.getElementById('prog-count').textContent=(E.exIdx+1)+'/'+exs.length;
  document.getElementById('prog-fill').style.width=Math.round((E.exIdx/exs.length)*100)+'%';

  let badges='';
  for(let i=0;i<(ex.series||3);i++){
    const c=i<E.serieIdxs[E.exIdx]?'done':i===E.serieIdxs[E.exIdx]?'current':'';
    badges+=`<div class="s-badge ${c}">${i+1}</div>`;
  }

  let nomeHtml='', linkHtml='';
  if(ex.tipo==='conjugado'){
    // links separados para cada exercício conjugado
    const n1=ex.link?`<a href="${ex.link}" target="_blank">${ex.nome}</a>`:ex.nome;
    const n2=ex.link2?`<a href="${ex.link2}" target="_blank">${ex.nome2}</a>`:ex.nome2;
    nomeHtml=`${n1} <span style="color:var(--amber)">+</span> ${n2}`;
    linkHtml=`<div class="link-row">
      ${ex.link?`<a class="link-btn" href="${ex.link}" target="_blank">▶ Ver ${ex.nome.split(' ')[0]}</a>`:''}
      ${ex.link2?`<a class="link-btn" href="${ex.link2}" target="_blank">▶ Ver ${ex.nome2.split(' ')[0]}</a>`:''}
    </div>`;
  }else{
    nomeHtml=ex.link?`<a href="${ex.link}" target="_blank">${ex.nome}</a>`:ex.nome;
    if(ex.link)linkHtml=`<div class="link-row"><a class="link-btn" href="${ex.link}" target="_blank">▶ Ver exercício</a></div>`;
  }

  const metaText=ex.tipo==='conjugado'
    ?`${ex.series||3} séries × ${ex.isTime?ex.reps+'s':ex.reps+' reps'} cada`
    :`${ex.series||3} séries × ${ex.isTime?ex.reps+'s':ex.reps+' reps'}`;

  document.getElementById('ex-card').innerHTML=`
    <div class="ex-tag">Exercício ${normDone+1} de ${normTotal}${ex.tipo==='conjugado'?' · conjugado':''}</div>
    <div class="ex-name">${nomeHtml}</div>
    ${ex.tipo==='conjugado'?`<div class="ex-conjugado">⚡ Faça os dois em sequência</div>`:''}
    <div class="ex-meta">${metaText}</div>
    <div class="series-badges">${badges}</div>

}

function getUltimaReps(){
  for(let i=E.serieIdxs[E.exIdx]-1;i>=0;i--){const s=E.series[E.exIdx][i];if(s&&s.reps)return s.reps}
  return '';
}
function getUltimaReps2(){
  for(let i=E.serieIdxs[E.exIdx]-1;i>=0;i--){const s=E.series[E.exIdx][i];if(s&&s.reps2)return s.reps2}
  return '';
}
function getUltimoPeso(){
  for(let i=E.serieIdxs[E.exIdx]-1;i>=0;i--){const s=E.series[E.exIdx][i];if(s&&s.peso)return s.peso}
  const hist=loadHist();
  for(const h of hist){
    if(h.tipo===E.tipo&&h.plano==='novo'){
      const nome=TREINOS[E.tipo].exercicios[E.exIdx].nome||'';
      const idx=h.exNames?h.exNames.indexOf(nome):-1;
      if(idx>=0&&h.series&&h.series[idx]){const last=h.series[idx].filter(Boolean).pop();if(last&&last.peso)return last.peso}
      break;
    }
  }
  return '';
}
function getUltimoPeso2(){
  for(let i=E.serieIdxs[E.exIdx]-1;i>=0;i--){const s=E.series[E.exIdx][i];if(s&&s.peso2)return s.peso2}
  const hist=loadHist();
  for(const h of hist){
    if(h.tipo===E.tipo&&h.plano==='novo'){
      const nome=TREINOS[E.tipo].exercicios[E.exIdx].nome||'';
      const idx=h.exNames?h.exNames.indexOf(nome):-1;
      if(idx>=0&&h.series&&h.series[idx]){const last=h.series[idx].filter(Boolean).pop();if(last&&last.peso2)return last.peso2}
      break;
    }
  }
  return '';
}

/* série */
function iniciarSerie(){
  E.serieStartTs=Date.now();save();
  document.getElementById('btn-start-serie').style.display='none';
  document.getElementById('btn-stop-serie').style.display='block';
  const n=document.getElementById('stnum');if(n){n.classList.remove('idle');n.classList.add('blinking')}
  const p=document.getElementById('stpulse');if(p)p.textContent='● gravando';
  clearInterval(serieTickInterval);
  serieTickInterval=setInterval(()=>{
    if(!E||!E.serieStartTs)return;
    const el=document.getElementById('stnum');if(el)el.textContent=fmtMS(elapsed(E.serieStartTs));
  },500);
}
function retomaSerieCronometro(){
  document.getElementById('btn-start-serie').style.display='none';
  document.getElementById('btn-stop-serie').style.display='block';
  clearInterval(serieTickInterval);
  serieTickInterval=setInterval(()=>{
    if(!E||!E.serieStartTs)return;
    const el=document.getElementById('stnum');if(el)el.textContent=fmtMS(elapsed(E.serieStartTs));
  },500);
}
function finalizarSerie(){
  clearInterval(serieTickInterval);
  const tempo=E.serieStartTs?elapsed(E.serieStartTs):0;
  E.serieStartTs=null;
  const ex=TREINOS[E.tipo].exercicios[E.exIdx];
  const peso=parseFloat(document.getElementById('inp-peso').value)||0;
  let reps=parseInt(document.getElementById('inp-reps').value)||0;

  if(ex.tipo==='conjugado'){
    const peso2=parseFloat(document.getElementById('inp-peso2').value)||0;
    let reps2=parseInt(document.getElementById('inp-reps2').value)||0;
    if(!reps){alert('Informe as repetições do 1º exercício');iniciarSerie();return}
    if(!reps2){alert('Informe as repetições do 2º exercício');iniciarSerie();return}
    E.series[E.exIdx][E.serieIdxs[E.exIdx]]={peso,reps,peso2,reps2,tempo};
  }else{
    if(!reps&&!ex.isTime){alert('Informe as repetições');iniciarSerie();return}
    if(!reps&&ex.isTime)reps=ex.reps;
    E.series[E.exIdx][E.serieIdxs[E.exIdx]]={peso,reps,tempo};
  }

  const totalS=ex.series||3;
  if(E.serieIdxs[E.exIdx]<totalS-1){
    E.serieIdxs[E.exIdx]++;
    E.restStartTs=Date.now();E.restTotal=REST_SERIE;E.restTipo='serie';save();
    const proxLabel=`${exNome(ex)} — Série ${E.serieIdxs[E.exIdx]+1} de ${totalS}`;
    iniciarDescanso(REST_SERIE,'DESCANSO ENTRE SÉRIES','gc','Respire e prepare-se',proxLabel,()=>goExercicio());
  }else{
    E.serieIdxs[E.exIdx]=0;
    const proxIdx=proximoExPendente(E.exIdx+1);
    E.restStartTs=Date.now();E.restTotal=REST_EX;E.restTipo='ex';save();
    let proxLabel='Finalizar treino';
    if(proxIdx!==-1){
      const pex=TREINOS[E.tipo].exercicios[proxIdx];
      proxLabel=pex.tipo==='esteira_fim'?'Esteira finalização (20 min)':
        `${exNome(pex)} — ${pex.series||3}×${pex.isTime?pex.reps+'s':pex.reps+' reps'}`;
    }
    iniciarDescanso(REST_EX,'DESCANSO ENTRE EXERCÍCIOS','ac','Troque de equipamento',proxLabel,()=>avancarExercicio());
  }
}
function proximoExPendente(from){
  const exs=TREINOS[E.tipo].exercicios;
  for(let i=from;i<exs.length;i++){
    if(exs[i].tipo==='esteira_fim')return i;
    if((exs[i].tipo==='normal'||exs[i].tipo==='conjugado')&&!exFoiConcluido(i)&&!exFoiPulado(i))return i;
  }
  return -1;
}

/* descanso */
function iniciarDescanso(total,tipo,cor,sub,prox,cb){
  _restCb=cb;
  document.getElementById('rest-overlay').classList.remove('hidden');
  document.getElementById('rest-type').textContent=tipo;
  document.getElementById('rest-big').className='rest-big '+cor;
  document.getElementById('rest-sub').textContent=sub;
  document.getElementById('rest-next').textContent='A seguir: '+prox;
  clearInterval(restTickInterval);
  restTickInterval=setInterval(()=>tickRest(total),500);
}
function mostrarDescansoRetomado(){
  document.getElementById('rest-overlay').classList.remove('hidden');
  document.getElementById('rest-type').textContent=E.restTipo==='serie'?'DESCANSO ENTRE SÉRIES':'DESCANSO ENTRE EXERCÍCIOS';
  document.getElementById('rest-big').className='rest-big '+(E.restTipo==='serie'?'gc':'ac');
  document.getElementById('rest-sub').textContent='Retomando...';
  document.getElementById('rest-next').textContent='';
  clearInterval(restTickInterval);
  restTickInterval=setInterval(()=>tickRest(E.restTotal),500);
}
function tickRest(total){
  if(!E||!E.restStartTs)return;
  const rem=restRem(E.restStartTs,total);
  const el=document.getElementById('rest-big');if(el)el.textContent=fmtMS(rem);
  if(rem<=0){
    clearInterval(restTickInterval);
    E.restStartTs=null;E.restTotal=0;save();
    esconderDescanso();if(_restCb)_restCb();
  }
}
function pularDescanso(){
  clearInterval(restTickInterval);E.restStartTs=null;E.restTotal=0;save();
  esconderDescanso();if(_restCb)_restCb();
}
function esconderDescanso(){document.getElementById('rest-overlay').classList.add('hidden')}

/* pular */
function pularExercicio(){
  const ex=TREINOS[E.tipo].exercicios[E.exIdx];
  const nome=exNome(ex);
  if(!confirm('Pular "'+nome+'"?\n\nVocê pode voltar a ele depois pela lista de exercícios.')){return}
  if(!E.pulados)E.pulados=[];
  E.pulados.push(E.exIdx);E.serieStartTs=null;save();avancarExercicio();
}

/* lista */
function abrirLista(){
  const exs=TREINOS[E.tipo].exercicios;
  document.getElementById('modal-titulo').textContent='Treino '+E.tipo;
  let html='';
  exs.forEach((ex,i)=>{
    if(ex.tipo==='esteira_inicio'){
      html+=`<div class="modal-item" style="opacity:.35;cursor:default">
        <span class="mi-num">${i+1}</span><span class="mi-name" style="color:var(--muted)">🏃 ${exNome(ex)}</span></div>`;return;
    }
    if(ex.tipo==='esteira_fim'){
      html+=`<div class="modal-item" onclick="irParaEx(${i})">
        <span class="mi-num">${i+1}</span><span class="mi-name">🏃 ${exNome(ex)}</span></div>`;return;
    }
    const pulado=exFoiPulado(i),done=exFoiConcluido(i),current=i===E.exIdx;
    let badge='';
    if(pulado)badge=`<span class="tag tag-red">pulado</span>`;
    else if(done)badge=`<span class="tag tag-green">✓</span>`;
    else if(current)badge=`<span class="tag tag-blue">atual</span>`;
    const locked=done||pulado;
    const cls=locked?'done-ex':current?'current-ex':'';
    const click=locked?'':`onclick="irParaEx(${i})"`;
    html+=`<div class="modal-item ${cls}" ${click}>
      <span class="mi-num">${i+1}</span>
      <span class="mi-name">${exNome(ex)}<br><span style="font-size:10px;color:var(--muted)">${ex.series||3}×${ex.isTime?ex.reps+'s':ex.reps+' reps'}</span></span>
      ${badge}</div>`;
  });
  document.getElementById('modal-items').innerHTML=html;
  document.getElementById('modal-lista').classList.remove('hidden');
}
function fecharListaFora(e){if(e.target.id==='modal-lista')fecharModalDireto()}
function fecharModalDireto(){document.getElementById('modal-lista').classList.add('hidden')}
function irParaEx(idx){
  fecharModalDireto();clearAllTicks();
  E.exIdx=idx;E.serieIdxs[idx]=0;E.serieStartTs=null;E.restStartTs=null;E.restTotal=0;save();goExercicio();
}

/* avançar */
function retornarPulado(idx){
  fecharModalDireto();clearAllTicks();
  // remove da lista de pulados para poder fazer normalmente
  E.pulados=E.pulados.filter(p=>p!==idx);
  E.exIdx=idx;E.serieIdxs[idx]=0;E.serieStartTs=null;E.restStartTs=null;E.restTotal=0;save();goExercicio();
  mostrarToast('↩ Retomando "'+exNome(TREINOS[E.tipo].exercicios[idx])+'"');
}
function voltarAosExercicios(){
  const modal=document.getElementById('modal-esteira-confirm');
  if(modal)modal.remove();
  // vai para o primeiro exercício pendente (não feito ou pulado)
  const exs=TREINOS[E.tipo].exercicios;
  const primeiro=exs.findIndex((e,i)=>
    (e.tipo==='normal'||e.tipo==='conjugado')&&
    (!exFoiConcluido(i)&&!exFoiPulado(i))||
    ((e.tipo==='normal'||e.tipo==='conjugado')&&exFoiPulado(i))
  );
  if(primeiro>=0){
    // se for pulado, remove da lista de pulados primeiro
    if(exFoiPulado(primeiro)){
      E.pulados=E.pulados.filter(p=>p!==primeiro);
    }
    E.exIdx=primeiro;E.serieIdxs[primeiro]=0;E.serieStartTs=null;save();goExercicio();
  }
}
function confirmarIrEsteira(){
  const modal=document.getElementById('modal-esteira-confirm');
  if(modal)modal.remove();
  const exs=TREINOS[E.tipo].exercicios;
  const idxEsteira=exs.findIndex(e=>e.tipo==='esteira_fim');
  if(idxEsteira>=0){E.exIdx=idxEsteira;E.serieIdxs[idxEsteira]=0;E.serieStartTs=null;save();goExercicio()}
  else finalizarTreino();
}
function avancarExercicio(){
  const exs=TREINOS[E.tipo].exercicios;
  let next=E.exIdx+1;
  while(next<exs.length){
    const ex=exs[next];
    if(ex.tipo==='esteira_inicio'){next++;continue}
    if(ex.tipo==='esteira_fim'){
      // verifica se ainda há exercícios pendentes (não feitos E não pulados)
      const naoFeitos=exs.filter((e,i)=>
        (e.tipo==='normal'||e.tipo==='conjugado')&&
        !exFoiConcluido(i)&&!exFoiPulado(i)
      );
      // exercícios pulados que ainda podem ser retomados
      const pulados=exs.filter((e,i)=>
        (e.tipo==='normal'||e.tipo==='conjugado')&&
        exFoiPulado(i)
      );
      if(naoFeitos.length>0||pulados.length>0){
        mostrarConfirmacaoEsteira(
          naoFeitos.map(e=>exNome(e)),
          pulados.map(e=>exNome(e))
        );
        return;
      }
      break; // sem pendentes, vai para esteira normalmente
    }
    if(exFoiConcluido(next)||exFoiPulado(next)){next++;continue}
    break;
  }
  if(next<exs.length){E.exIdx=next;E.serieIdxs[next]=0;E.serieStartTs=null;save();goExercicio()}
  else finalizarTreino();
}

function mostrarConfirmacaoEsteira(naoFeitos, pulados){
  const existing=document.getElementById('modal-esteira-confirm');
  if(existing)existing.remove();

  let listaHtml='';
  if(naoFeitos.length>0){
    listaHtml+=`<div style="font-size:11px;font-family:var(--mono);color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Não realizados:</div>`;
    listaHtml+=naoFeitos.map(n=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">• ${n}</div>`).join('');
  }
  if(pulados.length>0){
    listaHtml+=`<div style="font-size:11px;font-family:var(--mono);color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin:${naoFeitos.length?'10px':'0'} 0 6px">Pulados (pode retomar):</div>`;
    listaHtml+=pulados.map(n=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--amber)">• ${n}</div>`).join('');
  }

  const div=document.createElement('div');
  div.id='modal-esteira-confirm';
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:70;display:flex;flex-direction:column;justify-content:flex-end;padding:20px';
  div.innerHTML=`
    <div style="background:var(--surface);border-radius:24px;padding:20px">
      <div style="font-size:10px;font-family:var(--mono);letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin-bottom:8px">⚠️ Atenção — exercícios pendentes</div>
      <div style="margin-bottom:16px;max-height:220px;overflow-y:auto">${listaHtml}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5">Deseja ir para a esteira de finalização mesmo assim?<br><span style="font-size:12px">O treino será finalizado após a esteira, mesmo se parar antes do tempo.</span></div>
      <button onclick="confirmarIrEsteira()" style="width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,var(--green),#2aaa70);color:#fff;font-size:14px;font-family:var(--sans);font-weight:500;border:none;cursor:pointer;margin-bottom:8px">✅ Sim, ir para a esteira e finalizar</button>
      <button onclick="voltarAosExercicios()" style="width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#5b4fcf);color:#fff;font-size:14px;font-family:var(--sans);font-weight:500;border:none;cursor:pointer;margin-bottom:8px">💪 Voltar e fazer os pendentes</button>
      <button onclick="document.getElementById('modal-esteira-confirm').remove()" style="width:100%;padding:12px;border-radius:14px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:13px;font-family:var(--sans);cursor:pointer">Cancelar</button>
    </div>`;
  document.body.appendChild(div);
}

/* esteira */
function esteiraDuracao(tipo){ return tipo==='esteira_fim'?ESTEIRA_FIM_SECS:ESTEIRA_INICIO_SECS; }
function iniciarEsteira(){
  E.esteiraStartTs=Date.now();save();
  document.getElementById('btn-iniciar-esteira').style.display='none';
  document.getElementById('btn-parar-esteira').style.display='';
  atualizarEsteira();
  clearInterval(esteiraTickInterval);
  esteiraTickInterval=setInterval(atualizarEsteira,500);
}
function confirmarPararEsteira(){
  const feito=E.esteiraStartTs?Math.floor((Date.now()-E.esteiraStartTs)/1000):0;
  const min=Math.floor(feito/60), seg=feito%60;
  const tempoTxt=min+'min'+(seg?' '+seg+'s':'');
  if(confirm('Parar a esteira e salvar '+tempoTxt+' feitos?')){
    pararEsteira();
  }
}
function confirmarPularEsteira(){
  if(confirm('Pular esta esteira sem fazer nada? Será registrada como pulada (0min).')){
    pularEsteira();
  }
}
function pararEsteira(){
  clearInterval(esteiraTickInterval);
  if(!E.esteiraRegistrada){
    E.esteiraRegistrada=true;
    registrarEsteira('parada');  // registra antes de zerar
    E.esteiraStartTs=null;
    save();
    terminarEsteira();
  }
}
function registrarEsteira(status){
  if(!E.esteiraLog)E.esteiraLog=[];
  const dur=esteiraDuracao(E.esteiraTipo);
  const feito=E.esteiraStartTs?Math.floor((Date.now()-E.esteiraStartTs)/1000):0;
  E.esteiraLog.push({
    tipo:E.esteiraTipo,
    status,
    duracaoMeta:dur,
    duracaoFeita:Math.min(feito,dur),
  });
}
function goEsteira(tipo){
  E.esteiraTipo=tipo;
  // NÃO inicia o timer automaticamente — só ao apertar "Iniciar esteira"
  if(!E.esteiraLog)E.esteiraLog=[];
  E.esteiraRegistrada=false; // flag de proteção contra duplo registro
  save();
  showPage('esteira');
  const dur=esteiraDuracao(tipo);
  document.getElementById('esteira-title').textContent=tipo==='esteira_inicio'?'Esteira — aquecimento (10 min)':'Esteira — finalização (20 min)';
  document.getElementById('esteira-sub').textContent=tipo==='esteira_inicio'?'Aqueça bem antes de começar':'Ótimo trabalho! 20 minutos de recuperação.';
  document.getElementById('esteira-timer').textContent=fmtMS(dur);
  // mostra botão iniciar, esconde parar (ainda não começou)
  document.getElementById('btn-iniciar-esteira').style.display='';
  document.getElementById('btn-parar-esteira').style.display='none';
  clearInterval(esteiraTickInterval);
}
function mostrarEsteiraRetomada(){
  showPage('esteira');
  const tipo=E.esteiraTipo;
  document.getElementById('esteira-title').textContent=tipo==='esteira_inicio'?'Esteira — aquecimento (10 min)':'Esteira — finalização (20 min)';
  document.getElementById('esteira-sub').textContent='Retomando...';
  // já estava rodando — mostra botão parar
  document.getElementById('btn-iniciar-esteira').style.display='none';
  document.getElementById('btn-parar-esteira').style.display='';
  atualizarEsteira();clearInterval(esteiraTickInterval);esteiraTickInterval=setInterval(atualizarEsteira,500);
}
function atualizarEsteira(){
  if(!E||!E.esteiraStartTs)return;
  const dur=esteiraDuracao(E.esteiraTipo);
  const rem=restRem(E.esteiraStartTs,dur);
  const timerEl=document.getElementById('esteira-timer');
  if(timerEl)timerEl.textContent=fmtMS(rem);
  if(rem<=0){
    clearInterval(esteiraTickInterval);
    if(!E.esteiraRegistrada){
      E.esteiraRegistrada=true;
      registrarEsteira('concluida');
      E.esteiraStartTs=null;save();
      terminarEsteira();
    }
  }
}
function pularEsteira(){
  // pula completamente, sem ter feito nada — registra 0
  clearInterval(esteiraTickInterval);
  if(!E.esteiraRegistrada){
    E.esteiraRegistrada=true;
    if(!E.esteiraLog)E.esteiraLog=[];
    const dur=esteiraDuracao(E.esteiraTipo);
    E.esteiraLog.push({
      tipo:E.esteiraTipo,
      status:'pulada',
      duracaoMeta:dur,
      duracaoFeita:0,
    });
    E.esteiraStartTs=null;save();
    terminarEsteira();
  }
}
function terminarEsteira(){
  if(E.esteiraTipo==='esteira_fim'){finalizarTreino();return}
  E.esteiraTipo=null;save();avancarExercicio();
}

/* finalizar */
function finalizarTreino(){
  clearAllTicks();E.finalizado=true;E.fim=Date.now();save();
  addSessao(E.tipo);
  saveHist({
    tipo:E.tipo,plano:'novo',data:today(),dataStr:todayStr(),
    inicio:E.inicio,fim:E.fim,
    exNames:TREINOS[E.tipo].exercicios.map(ex=>ex.nome||exNome(ex)),
    series:E.series,pulados:E.pulados||[]
  });
  showPage('finished');renderFinished();
}
function buildEsteiraHtml(log){
  if(!log||!log.length)return '';
  let html='';
  log.forEach(e=>{
    const nome=e.tipo==='esteira_inicio'?'Esteira aquecimento':'Esteira finalização';
    const meta=e.tipo==='esteira_inicio'?'10min':'20min';
    const pulada=e.status==='pulada'; // pulada sem fazer nada (compat. antiga)
    const parada=e.status==='parada'; // parou antes do tempo, mas fez algo
    const feito=pulada?'pulada':fmtMS(e.duracaoFeita);
    const cor=pulada?'var(--amber)':(parada?'var(--amber)':'var(--green)');
    const icon=pulada?'⏭':(parada?'⏹':'🏃');
    const tag=pulada?'<span class="tag tag-amber">pulada</span>':(parada?'<span class="tag tag-amber">parcial</span>':'<span class="tag tag-green">✓</span>');
    html+=`<div class="card" style="padding:11px 14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:500">${icon} ${nome}</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="pill">${meta}</span>
          <span style="font-size:12px;font-family:var(--mono);color:${cor};font-weight:500">${feito}</span>
          ${tag}
        </div>
      </div>
    </div>`;
  });
  return html;
}
function estimarCaloriasTreino(durMs,vol){
  // estimativa simples: ~6 kcal/min de treino de força moderado-intenso + ajuste pelo volume
  const durMin=durMs/60000;
  const base=durMin*6; // ~6kcal/min é uma média para treino de força com pouco descanso
  const ajusteVolume=vol/100; // cada 100kg×rep de volume adiciona ~1kcal extra (ajuste fino)
  return Math.round(base+ajusteVolume);
}
function renderFinished(){
  const exs=TREINOS[E.tipo].exercicios;
  const dur=E.fim-E.inicio;
  const totalS=E.series.flat().filter(Boolean).length;
  const vol=E.series.flat().filter(Boolean).reduce((a,s)=>a+(s.peso*(s.reps||0))+(s.peso2||0)*(s.reps2||0),0);
  const sess=loadSessoes();
  const kcal=estimarCaloriasTreino(dur,vol);
  document.getElementById('fin-sub').textContent='Treino '+E.tipo+' · '+todayStr();
  document.getElementById('fin-stats').innerHTML=`
    <div class="stat-card"><div class="stat-num" style="font-size:19px">${fmtHMS(dur)}</div><div class="stat-label">Duração</div></div>
    <div class="stat-card"><div class="stat-num">${totalS}</div><div class="stat-label">Séries</div></div>
    <div class="stat-card"><div class="stat-num">${Math.round(vol)}</div><div class="stat-label">Volume kg×rep</div></div>
    <div class="stat-card"><div class="stat-num">${sess[E.tipo]}/${META_SESSOES}</div><div class="stat-label">Sessões ${E.tipo}</div></div>
    <div class="stat-card"><div class="stat-num">~${kcal}</div><div class="stat-label">Kcal estimadas</div></div>`;
  let html='';
  // esteiras primeiro
  html+=buildEsteiraHtml(E.esteiraLog||[]);
  exs.forEach((ex,i)=>{
    if(ex.tipo==='esteira_inicio'||ex.tipo==='esteira_fim')return;
    const ss=E.series[i].filter(Boolean);
    const pulado=exFoiPulado(i);
    if(ex.tipo==='conjugado'){
      html+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:11px;color:var(--amber);font-family:var(--mono)">⚡ conjugado</span>
          ${pulado?'<span class="tag tag-red">pulado</span>':''}
        </div>
        <div style="font-size:13px;font-weight:500;margin-bottom:5px;color:var(--accent2)">① ${ex.nome}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">${ss.map((s,j)=>`<span class="pill">S${j+1}: ${s.peso}kg×${s.reps} <span style="color:var(--muted)">${s.tempo}s</span></span>`).join('')}</div>
        <div style="font-size:13px;font-weight:500;margin-bottom:5px;color:var(--amber)">② ${ex.nome2}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${ss.map((s,j)=>`<span class="pill">S${j+1}: ${s.peso2||0}kg×${s.reps2||0}</span>`).join('')}</div>
      </div>`;
    }else{
      html+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
          <span style="font-size:13px;font-weight:500">${ex.nome}</span>
          ${pulado?'<span class="tag tag-red">pulado</span>':''}
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${ss.map((s,j)=>`<span class="pill">S${j+1}: ${s.peso}kg×${s.reps} <span style="color:var(--muted)">${s.tempo}s</span></span>`).join('')}</div>
      </div>`;
    }
  });
  document.getElementById('fin-detail').innerHTML=html;
}

/* ════ HISTÓRICO ════ */
function switchHistTab(tab){
  _histTab=tab;
  ['atual','antigo','evol','treinos'].forEach(t=>{
    const el=document.getElementById('htab-'+t);
    if(el) el.classList.toggle('active',t===tab);
  });
  renderHist(tab);
}
function renderHist(tab){
  const hist=loadHist();
  const div=document.getElementById('hist-content');

  if(tab==='atual'){
    // treinos novos (plano=novo) mais recentes
    const novos=hist.filter(h=>h.plano==='novo');
    if(!novos.length){div.innerHTML='<p style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">Nenhum treino do plano atual ainda.</p>';return}
    // resumo de sessões
    const sess=loadSessoes();
    const dias=diasAtePrazo();
    let html=`<div class="card" style="margin-bottom:14px">
      <div class="section-title" style="margin-bottom:8px">Progresso do plano</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Prazo: ${PRAZO.toLocaleDateString('pt-BR')} · ${dias>0?'Faltam '+dias+' dias':'Encerrado'}</div>
      ${ORDEM.map(t=>{
        const n=sess[t]||0,pct=Math.min(100,Math.round((n/META_SESSOES)*100));
        return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:12px;font-family:var(--mono);color:var(--accent2);min-width:14px">${t}</span>
          <div style="flex:1;height:5px;background:var(--surface2);border-radius:100px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:100px"></div>
          </div>
          <span style="font-size:11px;font-family:var(--mono);color:var(--muted)">${n}/${META_SESSOES}</span>
        </div>`;
      }).join('')}
    </div>`;
    novos.slice(0,20).forEach(h=>html+=buildHistCard(h));
    div.innerHTML=html;
  }else if(tab==='antigo'){
    const antigos=hist.filter(h=>!h.plano||h.plano==='antigo');
    if(!antigos.length){div.innerHTML='<p style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">Nenhum treino anterior registrado.</p>';return}
    div.innerHTML=antigos.slice(0,30).map(h=>buildHistCard(h)).join('');
  }else if(tab==='evol'){
    // evolução de carga
    const novos=hist.filter(h=>h.plano==='novo');
    if(novos.length<2){div.innerHTML='<p style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">Registre pelo menos 2 treinos para ver evolução.</p>';return}
    const byEx={};
    novos.forEach(h=>{
      const exs=TREINOS[h.tipo]?TREINOS[h.tipo].exercicios:[];
      exs.forEach((ex,i)=>{
        if(ex.tipo==='esteira_inicio'||ex.tipo==='esteira_fim')return;
        const ss=(h.series[i]||[]).filter(Boolean);
        if(!ss.length)return;
        if(ex.tipo==='conjugado'){
          // registra cada exercício do conjugado separado
          const nm1=ex.nome;
          const nm2=ex.nome2;
          if(!byEx[nm1])byEx[nm1]={conjugado:true,par:nm2,dados:[]};
          if(!byEx[nm2])byEx[nm2]={conjugado:true,par:nm1,dados:[],isSecond:true};
          const mp1=Math.max(...ss.map(s=>s.peso||0));
          const mp2=Math.max(...ss.map(s=>s.peso2||0));
          byEx[nm1].dados.push({data:h.dataStr,maxPeso:mp1});
          byEx[nm2].dados.push({data:h.dataStr,maxPeso:mp2});
        }else{
          const nm=ex.nome;
          if(!byEx[nm])byEx[nm]={conjugado:false,dados:[]};
          const mp=Math.max(...ss.map(s=>s.peso||0));
          byEx[nm].dados.push({data:h.dataStr,maxPeso:mp});
        }
      });
    });
    let html='';
    // agrupa conjugados juntos visualmente
    const jaRenderizado=new Set();
    Object.keys(byEx).forEach(nome=>{
      if(jaRenderizado.has(nome))return;
      const info=byEx[nome];
      if(info.dados.length<2)return;
      const u=info.dados[0],p=info.dados[1];
      const diff=+(u.maxPeso-p.maxPeso).toFixed(1);
      const seta=diff>0?`<span class="evol-up">▲ +${diff}kg</span>`:diff<0?`<span style="color:var(--red);font-size:11px">▼ ${diff}kg</span>`:`<span style="color:var(--muted)">→</span>`;
      if(info.conjugado&&info.par&&byEx[info.par]&&!info.isSecond){
        // renderiza o par conjugado junto
        const par=byEx[info.par];
        const u2=par.dados[0],p2=par.dados[1];
        const diff2=u2&&p2?+(u2.maxPeso-p2.maxPeso).toFixed(1):0;
        const seta2=diff2>0?`<span class="evol-up">▲ +${diff2}kg</span>`:diff2<0?`<span style="color:var(--red);font-size:11px">▼ ${diff2}kg</span>`:`<span style="color:var(--muted)">→</span>`;
        html+=`<div class="card" style="padding:12px 14px">
          <div style="font-size:10px;color:var(--amber);font-family:var(--mono);margin-bottom:8px">⚡ conjugado</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div>
              <div style="font-size:12px;font-weight:500;color:var(--accent2)">① ${nome}</div>
              <div style="font-size:11px;color:var(--muted)">Último: <b style="color:var(--text)">${u.maxPeso}kg</b> · ${u.data}</div>
            </div>${seta}
          </div>
          <div style="height:1px;background:var(--border);margin:6px 0"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
            <div>
              <div style="font-size:12px;font-weight:500;color:var(--amber)">② ${info.par}</div>
              <div style="font-size:11px;color:var(--muted)">Último: <b style="color:var(--text)">${u2?u2.maxPeso:0}kg</b> · ${u2?u2.data:'-'}</div>
            </div>${seta2}
          </div>
        </div>`;
        jaRenderizado.add(nome);
        jaRenderizado.add(info.par);
      }else if(!info.conjugado){
        html+=`<div class="card" style="padding:11px 14px">
          <div style="font-size:13px;font-weight:500;margin-bottom:3px">${nome}</div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:11px;color:var(--muted)">Último: <b style="color:var(--text)">${u.maxPeso}kg</b> · ${u.data}</span>${seta}
          </div>
        </div>`;
        jaRenderizado.add(nome);
      }
    });
    div.innerHTML=html||'<p style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">Dados insuficientes para evolução.</p>';
  }else if(tab==='treinos'){
    // Lista dos treinos atuais A e B para consulta/referência
    let html='<div class="card" style="margin-bottom:14px;background:rgba(124,106,247,.07);border-color:rgba(124,106,247,.2)"><div style="font-size:12px;color:var(--accent2);line-height:1.6">📋 Treinos atuais para consulta rápida.</div></div>';
    ORDEM.forEach(t=>{
      const tr=TREINOS[t];
      const exs=tr.exercicios.filter(e=>e.tipo==='normal'||e.tipo==='conjugado');
      html+=`<div class="card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <span style="font-size:22px;font-weight:600;font-family:var(--mono);background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent">${t}</span>
          <div>
            <div style="font-size:14px;font-weight:500">${tr.nome}</div>
            <div style="font-size:11px;color:var(--muted)">${tr.info}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;padding:8px 10px;background:var(--surface2);border-radius:8px">
          <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">🏃 Esteira aquecimento 10min</span>
        </div>
        ${exs.map((ex,i)=>`
          <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border)">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500">${ex.nome}</div>
              ${ex.nome2?`<div style="font-size:11px;color:var(--amber);margin-top:2px">+ ${ex.nome2}</div>`:''}
            </div>
            <span style="font-size:11px;font-family:var(--mono);color:var(--muted);white-space:nowrap;margin-left:10px">${ex.series||3}×${ex.isTime?ex.reps+'s':ex.reps+' reps'}</span>
          </div>`).join('')}
        <div style="display:flex;align-items:center;gap:6px;margin-top:10px;padding:8px 10px;background:var(--surface2);border-radius:8px">
          <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">🏃 Esteira finalização 10min</span>
        </div>
      </div>`;
    });
    div.innerHTML=html;
  }
}
function buildHistCard(h){
  const dur=fmtHMS((h.fim||0)-(h.inicio||0));
  const exs=(TREINOS[h.tipo]?TREINOS[h.tipo].exercicios:null)
    ||(TREINOS_ANTIGOS[h.tipo]?TREINOS_ANTIGOS[h.tipo].exercicios:null)
    ||[];
  let exHtml='';
  if(exs.length>0){
    exs.forEach((ex,i)=>{
      if(ex.tipo==='esteira_inicio'||ex.tipo==='esteira_fim')return;
      const ss=(h.series&&h.series[i])?h.series[i].filter(Boolean):[];
      const pulado=h.pulados&&h.pulados.includes(i);
      if(!ss.length&&!pulado)return;
      if(ex.tipo==='conjugado'){
        exHtml+=`<div style="margin-bottom:10px;padding:8px;background:var(--surface2);border-radius:10px">
          <div style="font-size:10px;color:var(--amber);font-family:var(--mono);margin-bottom:5px">⚡ conjugado${pulado?' <span style="color:var(--red)">(pulado)</span>':''}</div>
          <div style="font-size:11px;color:var(--accent2);margin-bottom:3px">① ${ex.nome}</div>
          <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px">${ss.map((s,j)=>`<span class="pill">S${j+1}: ${s.peso}kg×${s.reps} <span style="color:var(--muted)">${s.tempo}s</span></span>`).join('')}</div>
          <div style="font-size:11px;color:var(--amber);margin-bottom:3px">② ${ex.nome2}</div>
          <div style="display:flex;gap:3px;flex-wrap:wrap">${ss.map((s,j)=>`<span class="pill">S${j+1}: ${s.peso2||0}kg×${s.reps2||0}</span>`).join('')}</div>
        </div>`;
      }else{
        exHtml+=`<div style="margin-bottom:7px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px">${ex.nome}${pulado?' <span style="color:var(--red)">(pulado)</span>':''}</div>
          <div style="display:flex;gap:3px;flex-wrap:wrap">${ss.map((s,j)=>`<span class="pill">S${j+1}: ${s.peso}kg×${s.reps} <span style="color:var(--muted)">${s.tempo}s</span></span>`).join('')}</div>
        </div>`;
      }
    });
  }else if(h.exNames){
    h.exNames.forEach((nm,i)=>{
      if(!nm||nm.includes('Esteira'))return;
      const ss=(h.series&&h.series[i])?h.series[i].filter(Boolean):[];
      if(!ss.length)return;
      exHtml+=`<div style="margin-bottom:7px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:3px">${nm}</div>
        <div style="display:flex;gap:3px;flex-wrap:wrap">${ss.map((s,j)=>`<span class="pill">S${j+1}: ${s.peso}kg×${s.reps} <span style="color:var(--muted)">${s.tempo}s</span></span>`).join('')}</div>
      </div>`;
    });
  }
  const planoTag=h.plano==='novo'
    ?`<span class="tag tag-blue" style="margin-left:6px">atual</span>`
    :`<span class="tag tag-muted" style="margin-left:6px">anterior</span>`;
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:15px;font-weight:500">Treino ${h.tipo}${planoTag}</span>
      <span style="font-size:11px;font-family:var(--mono);color:var(--muted)">${h.dataStr||'?'} · ${dur}</span>
    </div>${exHtml}
  </div>`;
}

/* visibilidade */
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&E&&!E.finalizado)retomar();
});


/* ════ TEMA ════ */
function toggleTema(){
  const isLight=document.body.classList.contains('light');
  const novoTema=isLight?'dark':'light';
  try{localStorage.setItem('gym_ma_tema',novoTema)}catch(e){}
  aplicarTema(novoTema);
}
function aplicarTema(tema){
  if(tema==='light'){
    document.body.classList.add('light');
    document.getElementById('theme-icon').textContent='🌙';
    document.getElementById('theme-label').textContent='Escuro';
  }else{
    document.body.classList.remove('light');
    document.getElementById('theme-icon').textContent='☀️';
    document.getElementById('theme-label').textContent='Claro';
  }
}
function carregarTema(){
  try{
    const t=localStorage.getItem('gym_ma_tema')||'dark';
    aplicarTema(t);
  }catch(e){}
}

function abrirConfigToken(){
  const existing=document.getElementById('modal-token');
  if(existing)existing.remove();
  const token=getToken();
  const div=document.createElement('div');
  div.id='modal-token';
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:70;display:flex;flex-direction:column;justify-content:flex-end;padding:20px';
  div.innerHTML=`
    <div style="background:var(--surface);border-radius:24px;padding:20px;max-height:90vh;overflow-y:auto">
      <div style="font-size:11px;font-family:var(--mono);letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:8px">🔐 Backup no GitHub</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6">
        O histórico fica salvo no seu GitHub e nunca se perde ao limpar o cache.<br><br>
        <b style="color:var(--text)">Como criar o token:</b><br>
        1. github.com → foto → Settings<br>
        2. Developer settings → Personal access tokens → Tokens (classic)<br>
        3. Generate new token → marque <b>repo</b><br>
        4. Copie e cole abaixo
      </div>
      <div style="font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Token atual: ${token?'✓ configurado':'não configurado'}</div>
      <input id="inp-token" type="password" placeholder="ghp_xxxxxxxxxxxx" style="width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px;font-size:14px;font-family:var(--mono);color:var(--text);outline:none;margin-bottom:12px;-webkit-appearance:none" value="${token}">
      <button onclick="salvarToken()" style="width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#5b4fcf);color:#fff;font-size:14px;font-family:var(--sans);font-weight:500;border:none;cursor:pointer;margin-bottom:8px">Salvar token</button>
      ${token?`<button onclick="restaurarDoGitHub();document.getElementById('modal-token').remove()" style="width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,var(--green),#2aaa70);color:#fff;font-size:14px;font-family:var(--sans);font-weight:500;border:none;cursor:pointer;margin-bottom:8px">↓ Restaurar histórico do GitHub</button>`:''}
      <button onclick="document.getElementById('modal-token').remove()" style="width:100%;padding:12px;border-radius:14px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:13px;font-family:var(--sans);cursor:pointer">Fechar</button>
    </div>`;
  document.body.appendChild(div);
}
function atualizarStatusConexao(){
  const bar=document.getElementById('offline-bar');
  if(!bar)return;
  bar.style.display=navigator.onLine?'none':'block';
}
/* ════ INIT ════ */
function inicializarSessoesIniciais(){
  const CHAVE_INIT = 'gym_ma_init_v3';
  if(localStorage.getItem(CHAVE_INIT)) return;
  const sess = loadSessoes();
  if(sess.A<=5) sess.A = 4;
  if(sess.B<3)  sess.B = 3;
  localStorage.setItem('gym_sess_v6', JSON.stringify(sess));
  localStorage.setItem(CHAVE_INIT, '1');
}

carregarTema();
migrarHistoricoAntigo();
inicializarSessoesIniciais();
renderHome();

atualizarStatusBackup();
setInterval(atualizarStatusBackup, 60000);

if(getToken()){
  sincronizarGitHub();
}

});

/* ════ SPLASH SCREEN ════ */
function removerSplash(){
  const splash=document.getElementById('splash');
  if(splash){splash.style.opacity='0';setTimeout(()=>{if(splash.parentNode)splash.parentNode.removeChild(splash)},400);}
}
// Remove imediatamente após o JS carregar (funciona na prévia e no app)
removerSplash();
// Fallbacks extras
document.addEventListener('DOMContentLoaded', removerSplash);
window.addEventListener('load', removerSplash);
setTimeout(removerSplash, 800);
